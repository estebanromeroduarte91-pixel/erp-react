<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // GitHub Pages SPA redirect — redirige 404 a index.html preservando la ruta
    // segmentCount = 1 porque la base es /erp-react/ (1 segmento)
    var segmentCount = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
</html>
