<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ERP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script>
      // GitHub Pages SPA redirect: restaura la ruta desde el parámetro ?p=
      (function(l){
        if(l.search[1]==='p'){
          var decoded=l.search.slice(1).split('&').map(function(s){return s.replace(/~and~/g,'&')});
          window.history.replaceState(null,null,
            l.pathname.slice(0,-1)+'/'+decoded[0].slice(1)+(decoded[1]?'?'+decoded[1]:'')+l.hash
          );
        }
      }(window.location))
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
